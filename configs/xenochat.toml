# Xenochat baseline runtime configuration
api.host = "127.0.0.1"
api.port = 9800
api.allowed_origins = "https://xenochat.local"
# Keep empty for local development on 127.0.0.1.
# For non-local bind, create encrypted keys:
#   export XENOCHAT_MASTER_KEY='your-master-passphrase'
#   xenochat-cli seal-key 'your-api-key'
# Or store a master key in macOS Keychain service xenochat.master-key.
# Then place the returned value below.
api.api_keys = ""

queue.capacity = 4096
queue.drop_when_full = false

gpu.prefer_metal = true
gpu.allow_cpu_fallback = true
